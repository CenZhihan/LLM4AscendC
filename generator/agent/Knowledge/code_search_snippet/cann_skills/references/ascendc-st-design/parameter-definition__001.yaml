parameters:
# Tensor 类型参数（输入）
- name: <参数名>
  type: aclTensor
  required: <true|false>
  io_type: input
  format: "<格式>"
  dimensions: [<维度1>, <维度2>, ...]
  dtype_with_ranges:
    - dtype: <数据类型1>
      value_range: [[<min>, <max>], [<min>, <max>], ...] 
    - dtype: <数据类型2>
      value_range: [[<min>, <max>], ...]

# Tensor 类型参数（输出）
- name: <参数名>
  type: aclTensor
  required: <true|false>
  io_type: output
  format: "<格式>"
  dimensions: [<维度1>, <维度2>, ...]
  dtype_with_ranges:
    - dtype: <数据类型1>
    - dtype: <数据类型2>

# 非Tensor枚举类型参数
- name: <参数名>
  type: <int8_t|aclScalar|...>
  required: <true|false>
  io_type: input
  is_enum: true
  dtype_with_values:
    - dtype: <数据类型>
      value: [枚举值1, 枚举值2, ...]  # 必填

# 非Tensor非枚举类型参数
- name: <参数名>
  type: <aclScalar|int8_t|...>
  required: <true|false>
  io_type: input
  is_enum: false
  dtype_with_values:
    - dtype: <数据类型1>
      value_range: [[<min>, <max>], ...]
    - dtype: <数据类型2>
      value_range: [[<min>, <max>], ...]
