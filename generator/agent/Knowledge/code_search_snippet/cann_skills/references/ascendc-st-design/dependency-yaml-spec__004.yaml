# 等值计算
- id: "C001"
  type: calculate
  sources: ["self.dtype"]
  target: "out.dtype"
  expression: "sources[0]"
  description: "输出类型等于self类型"

# 形状计算
- id: "C006"
  type: calculate
  sources: ["batch1.shape", "batch2.shape"]
  target: "out.shape"
  expression: "[sources[0][1], sources[1][2]]"  # [M, N]
  description: "out.shape = [batch1[1], batch2[2]]"
