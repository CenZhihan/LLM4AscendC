# Tensor 输入示例
- name: "self"
  type: "aclTensor"
  required: true
  io_type: "input"
  format: "ND"
  dimensions: [1, 2]
  dtype_with_ranges:
    - dtype: "float16"
      value_range: [[0, 0.001], [0.001, 0.01], [0.01, 1], [1, 2], [2, 10], [10, 1000], [-0.001, 0], [-0.01, -0.001], [-1, -0.01], [-2, -1], [-10, -2], [-1000, -10], [-1, 1], [-0.01, 0.01], [-100, 100], [0, 0], [-65504.0, 65504.0], [-0.0078125, 0.0078125], [65504.0, 65504.0], [-65504.0, -65504.0], [-6.103515625e-05, -6.103515625e-05], [6.103515625e-05, 6.103515625e-05], ["inf", "inf"], ["-inf", "-inf"], ["nan", "nan"]]

# Tensor 输出示例
- name: "out"
  type: "aclTensor"
  required: true
  io_type: "output"
  format: "ND"
  dimensions: [1, 2]
  dtype_with_ranges:
    - dtype: "float16"
    - dtype: "float32"

# Scalar 非枚举类型示例（多数据类型）
# 注意：dtype_with_values 中的数据类型必须与原始资料完全一致，不允许遗漏
- name: "beta"
  type: "aclScalar"
  required: true
  io_type: "input"
  is_enum: false
  dtype_with_values:
    - dtype: "float32"
      value_range: [[0, 0.001], [0.001, 0.01], [0.01, 1], [1, 2], [2, 10], [10, 1000], [-0.001, 0], [-0.01, -0.001], [-1, -0.01], [-2, -1], [-10, -2], [-1000, -10], [-1, 1], [-0.01, 0.01], [-100, 100], [0, 0], [-3.4028235e+38, 3.4028235e+38], ["inf", "inf"], ["-inf", "-inf"], ["nan", "nan"]]
    - dtype: "float16"
      value_range: [[0, 0.001], [0.001, 0.01], [0.01, 1], [1, 2], [2, 10], [10, 1000], [-0.001, 0], [-0.01, -0.001], [-1, -0.01], [-2, -1], [-10, -2], [-1000, -10], [-1, 1], [-0.01, 0.01], [-100, 100], [0, 0], [-65504.0, 65504.0], ["inf", "inf"], ["-inf", "-inf"], ["nan", "nan"]]
    - dtype: "int32"
      value_range: [[0, 1], [1, 2], [2, 10], [10, 1000], [-1, 0], [-2, -1], [-10, -2], [-1000, -10], [-1, 1], [-100, 100], [0, 0]]
    # ... 根据原始资料继续列出所有支持的数据类型

# 整型枚举类型示例
- name: "cubeMathType"
  type: "int8_t"
  required: true
  io_type: "input"
  is_enum: true
  dtype_with_values:
    - dtype: "int8"
      value: [0, 1, 2, 3]  # 枚举值列表

# 整型非枚举类型示例
- name: "axis"
  type: "int32_t"
  required: true
  io_type: "input"
  is_enum: false
  dtype_with_values:
    - dtype: "int32"
      value_range: [[0, 1], [1, 2], [2, 10], [10, 1000], [-1, 0], [-2, -1], [-10, -2], [-1000, -10], [-1, 1], [-100, 100], [0, 0], [-2147483648, 2147483647], [-2147483648, -2147483648], [2147483647, 2147483647]]  # 普通范围和特殊值
